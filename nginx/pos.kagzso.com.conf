# ── KAGZSO POS — Nginx site config ─────────────────────────────────────────────
# Copy to: /etc/nginx/sites-available/pos.kagzso.com
# Enable:  ln -s /etc/nginx/sites-available/pos.kagzso.com /etc/nginx/sites-enabled/
# Test:    nginx -t
# Reload:  systemctl reload nginx
#
# Assumes:
#   - SSL cert issued by Certbot:  certbot --nginx -d pos.kagzso.com
#   - Frontend built to:           /var/www/kagzso-main-pos/client/dist
#   - Backend running via PM2 on:  http://localhost:5005
# ────────────────────────────────────────────────────────────────────────────────

# Redirect plain HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name pos.kagzso.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name pos.kagzso.com;

    # ── SSL (managed by Certbot — do not edit manually) ────────────────────────
    ssl_certificate     /etc/letsencrypt/live/pos.kagzso.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pos.kagzso.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Logging ────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/pos.kagzso.com.access.log;
    error_log  /var/log/nginx/pos.kagzso.com.error.log;

    # ── Frontend (React SPA) ───────────────────────────────────────────────────
    root  /var/www/kagzso-main-pos/client/dist;
    index index.html;

    # ── Uploads (served directly by Nginx — faster than Express) ──────────────
    location /uploads/ {
        alias /var/www/kagzso-main-pos/server/uploads/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── API proxy → Express backend (port 5005) ────────────────────────────────
    location /api/ {
        proxy_pass         http://localhost:5005;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Disable buffering for streaming/SSE responses
        proxy_buffering    off;
        proxy_read_timeout 60s;
    }

    # ── Socket.IO proxy → Express backend (WebSocket upgrade required) ─────────
    location /socket.io/ {
        proxy_pass         http://localhost:5005;
        proxy_http_version 1.1;

        # WebSocket handshake headers
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long timeout — keep WebSocket connections alive
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── SPA fallback — all other paths serve index.html (React Router handles them)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
