# ── KAGZSO POS — Apache2 backend virtual host ────────────────────────────────
# Domain  : db.pos.kagzso.com
# Purpose : Reverse-proxy ALL traffic (HTTP + WebSocket) to Express on :5005
#
# Deploy:
#   sudo cp apache/db.pos.kagzso.com.conf /etc/apache2/sites-available/
#   sudo a2ensite db.pos.kagzso.com.conf
#   sudo certbot --apache -d db.pos.kagzso.com   # first-time SSL
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# Required modules (run once):
#   sudo a2enmod proxy proxy_http proxy_wstunnel rewrite headers ssl
# ─────────────────────────────────────────────────────────────────────────────

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName db.pos.kagzso.com
    Redirect permanent / https://db.pos.kagzso.com/
</VirtualHost>

# ── HTTPS + WebSocket proxy ───────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName db.pos.kagzso.com

    # ── SSL (managed by Certbot — do not edit manually) ──────────────────────
    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/db.pos.kagzso.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/db.pos.kagzso.com/privkey.pem
    Include               /etc/letsencrypt/options-ssl-apache.conf

    # ── Forwarded-* headers so Express sees the real client IP / protocol ─────
    ProxyPreserveHost On
    ProxyRequests     Off
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port  "443"

    # ── Logging ───────────────────────────────────────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/db.pos.kagzso.com-error.log
    CustomLog ${APACHE_LOG_DIR}/db.pos.kagzso.com-access.log combined

    # ── WebSocket upgrade rule (must come BEFORE the HTTP ProxyPass) ──────────
    # mod_proxy_wstunnel handles the Upgrade: websocket handshake.
    # The RewriteRule catches every WebSocket request and tunnels it to the
    # backend with the ws:// scheme; all other requests fall through to ProxyPass.
    RewriteEngine On
    RewriteCond   %{HTTP:Upgrade} =websocket [NC]
    RewriteRule   ^/socket\.io/(.*) ws://127.0.0.1:5005/socket.io/$1 [P,L]

    # Socket.IO polling fallback (non-upgrade requests to /socket.io/)
    ProxyPass        /socket.io/ http://127.0.0.1:5005/socket.io/
    ProxyPassReverse /socket.io/ http://127.0.0.1:5005/socket.io/

    # All other API / health / upload traffic
    ProxyPass        / http://127.0.0.1:5005/
    ProxyPassReverse / http://127.0.0.1:5005/

    # Keep WebSocket connections alive for the lifetime of the connection
    ProxyTimeout 86400
</VirtualHost>
