# ── KAGZSO POS — Apache2 frontend virtual host ───────────────────────────────
# Domain  : pos.kagzso.com
# Purpose : Serve the React SPA (static files from client/dist)
#
# Deploy:
#   sudo cp apache/pos.kagzso.com.conf /etc/apache2/sites-available/
#   sudo a2ensite pos.kagzso.com.conf
#   sudo certbot --apache -d pos.kagzso.com      # first-time SSL
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# Required modules (run once):
#   sudo a2enmod rewrite headers ssl expires
# ─────────────────────────────────────────────────────────────────────────────

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName pos.kagzso.com
    Redirect permanent / https://pos.kagzso.com/
</VirtualHost>

# ── HTTPS static SPA ──────────────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName pos.kagzso.com

    # ── SSL (managed by Certbot — do not edit manually) ──────────────────────
    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/pos.kagzso.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/pos.kagzso.com/privkey.pem
    Include               /etc/letsencrypt/options-ssl-apache.conf

    # ── Document root (React production build) ────────────────────────────────
    DocumentRoot /var/www/kagzso-main-pos/client/dist

    <Directory /var/www/kagzso-main-pos/client/dist>
        Options       -Indexes +FollowSymLinks
        AllowOverride All
        Require       all granted

        # ── SPA fallback: unknown paths → index.html (React Router handles them)
        RewriteEngine On
        RewriteBase   /
        RewriteRule   ^index\.html$ - [L]
        RewriteCond   %{REQUEST_FILENAME} !-f
        RewriteCond   %{REQUEST_FILENAME} !-d
        RewriteRule   . /index.html [L]
    </Directory>

    # ── Cache hashed JS/CSS assets for 1 year; never cache index.html ─────────
    <FilesMatch "\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$">
        ExpiresActive On
        ExpiresDefault "access plus 1 year"
        Header append  Cache-Control "public, immutable"
    </FilesMatch>

    <FilesMatch "^index\.html$">
        Header set Cache-Control "no-cache, no-store, must-revalidate"
        Header set Pragma         "no-cache"
        Header set Expires        "0"
    </FilesMatch>

    # ── Logging ───────────────────────────────────────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/pos.kagzso.com-error.log
    CustomLog ${APACHE_LOG_DIR}/pos.kagzso.com-access.log combined
</VirtualHost>
